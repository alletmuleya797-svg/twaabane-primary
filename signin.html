<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Twaabane Primary School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --navy: #002D62;
            --gold: #FFD700;
            --white: #ffffff;
            --bg-gray: #f0f2f5;
            --text-dark: #333;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, #001a3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.8s ease;
        }

        /* Header Styles */
        .login-header {
            text-align: center;
            color: var(--white);
            margin-bottom: 30px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            object-fit: contain;
        }

        .login-header h1 {
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Card & Tabs */
        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
            border-bottom: 2px solid #eee;
        }

        .tab-label {
            flex: 1;
            text-align: center;
            padding: 12px 5px;
            cursor: pointer;
            font-weight: 600;
            color: #888;
            transition: var(--transition);
            font-size: 0.9rem;
            z-index: 1;
        }

        .tab-indicator {
            position: absolute;
            bottom: -2px;
            left: 0;
            height: 3px;
            width: 33.33%;
            background: var(--navy);
            transition: var(--transition);
            border-radius: 10px 10px 0 0;
        }

        /* Tab Switching Logic */
        input[type="radio"] { display: none; }

        #student:checked ~ .tabs .tab-indicator { left: 0; }
        #staff:checked ~ .tabs .tab-indicator { left: 33.33%; }
        #admin:checked ~ .tabs .tab-indicator { left: 66.66%; }

        #student:checked ~ .tabs label[for="student"],
        #staff:checked ~ .tabs label[for="staff"],
        #admin:checked ~ .tabs label[for="admin"] {
            color: var(--navy);
        }

        /* Form Content */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            transition: var(--transition);
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: var(--transition);
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: var(--navy);
            box-shadow: 0 0 0 3px rgba(0, 45, 98, 0.1);
        }

        .input-group input:focus + i {
            color: var(--navy);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
            color: #666;
        }

        .form-options a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 500;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        /* Submit Button */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            border: none;
            border-radius: 10px;
            color: var(--navy);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: var(--transition);
        }

        .btn-login:hover {
            background: #f2cc00;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-login i {
            transition: transform 0.3s ease;
        }

        .btn-login:hover i {
            transform: translateX(5px);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
        }

        .login-footer a {
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .login-footer a:hover {
            opacity: 1;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            .tab-label { font-size: 0.8rem; }
            .login-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <img src="school-logo.png" alt="Twaabane Logo" class="login-logo">
            <h1>Twaabane Primary</h1>
            <p>Select your portal and sign in to continue</p>
        </div>

        <div class="login-card">
            <input type="radio" name="login-role" id="student" checked>
            <input type="radio" name="login-role" id="staff">
            <input type="radio" name="login-role" id="admin">

            <div class="tabs">
                <label for="student" class="tab-label">
                    <i class="fas fa-user-graduate"></i><br>Student
                </label>
                <label for="staff" class="tab-label">
                    <i class="fas fa-chalkboard-teacher"></i><br>Staff
                </label>
                <label for="admin" class="tab-label">
                    <i class="fas fa-user-shield"></i><br>Admin
                </label>
                <div class="tab-indicator"></div>
            </div>

            <form action="#" class="login-form">
                <div class="input-group">
                    <input type="text" placeholder="Username or ID Number" required>
                    <i class="fas fa-user"></i>
                </div>
                
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                    <i class="fas fa-lock"></i>
                </div>
                
                <div class="form-options">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Reset Password</a>
                </div>

                <button type="submit" class="btn-login">
                    <span>SIGN IN</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>

        <div class="login-footer">
            <a href="index.html"><i class="fas fa-chevron-left"></i> Return to Homepage</a>
        </div>
    </div>

</body>
</html>
