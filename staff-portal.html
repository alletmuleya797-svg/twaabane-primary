<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twaabane Primary Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #002147;
            --gold: #FFC107;
            --white: #ffffff;
            --light-gray: #f4f7f6;
            --text-gray: #555;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-gray);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 260px;
            background-color: var(--navy);
            color: var(--white);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            position: fixed;
            height: 100vh;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-menu { list-style: none; padding: 20px 0; flex-grow: 1; }

        .nav-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border: none;
            background: none;
            width: 100%;
            font-family: inherit;
        }

        .nav-item i { margin-right: 15px; width: 20px; font-size: 1.1rem; }

        .nav-item:hover, .nav-item.active {
            background-color: var(--gold);
            color: var(--navy);
            font-weight: 600;
        }

        /* --- Main Content Area --- */
        .main-content {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 30px;
            transition: var(--transition);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--white);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .user-profile { display: flex; align-items: center; gap: 12px; }

        .avatar {
            width: 40px; height: 40px; background: var(--gold);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: var(--navy); font-weight: bold;
        }

        /* --- Dashboard Grid --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white); padding: 25px; border-radius: 12px;
            box-shadow: var(--shadow); border-left: 5px solid var(--gold);
            transition: var(--transition);
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 2rem; color: var(--navy); margin-bottom: 15px; }
        .stat-card h3 { font-size: 0.9rem; color: var(--text-gray); text-transform: uppercase; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--navy); }

        .content-card {
            background: var(--white); padding: 25px; border-radius: 12px;
            box-shadow: var(--shadow); animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- RESPONSIVE MOBILE FIXES --- */
        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar-header h2, .nav-item span { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); }
        }

        @media (max-width: 600px) {
            body { flex-direction: column; }
            .sidebar {
                position: relative; width: 100%; height: auto;
                flex-direction: row; justify-content: space-around;
            }
            .sidebar-header { display: none; }
            .nav-menu { display: flex; padding: 0; width: 100%; }
            .nav-item { padding: 15px; justify-content: center; }
            .main-content { margin-left: 0; width: 100%; padding: 15px; }
            header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2 id="portalName" style="color: var(--gold); font-size: 1.2rem;">PORTAL</h2>
        </div>
        <ul class="nav-menu" id="sideNav"></ul>
        <button onclick="handleLogout()" class="nav-item" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1);">
            <i class="fas fa-sign-out-alt"></i><span>Logout</span>
        </button>
    </div>

    <div class="main-content">
        <header>
            <h2 id="welcomeMsg">Checking Auth...</h2>
            <div class="user-profile">
                <div class="avatar" id="userInitials">--</div>
                <span id="userName">Loading...</span>
            </div>
        </header>

        <div class="dashboard-grid" id="statsGrid"></div>

        <div class="content-card">
            <h3 id="sectionTitle">Recent Activity</h3>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <p id="sectionDesc">Select an option from the sidebar to manage your school tasks.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabaseUrl = 'https://fikkzdvzhrrbdaeqoloz.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpa2t6ZHZ6aHJyYmRhZXFvbG96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MDIxMDQsImV4cCI6MjA4NjQ3ODEwNH0.UCdrrtpDfDfPEis8LRidW_A9GTh2dxbpkBEQ8auZd7E';
        const _supabase = supabase.createClient(_supabaseUrl, _supabaseKey);

        const config = {
            student: {
                name: "STUDENT PORTAL", welcome: "Hello, Scholar!",
                nav: [
                    { icon: "fa-home", text: "Dashboard" },
                    { icon: "fa-book-open", text: "My Courses" },
                    { icon: "fa-file-invoice", text: "Report Cards" }
                ],
                stats: [
                    { icon: "fa-award", label: "GPA", value: "3.8" },
                    { icon: "fa-tasks", label: "Tasks", value: "4" }
                ]
            },
            staff: {
                name: "STAFF PORTAL", welcome: "Welcome, Educator",
                nav: [
                    { icon: "fa-chalkboard-teacher", text: "My Classes" },
                    { icon: "fa-user-check", text: "Attendance" },
                    { icon: "fa-edit", text: "Gradebook" }
                ],
                stats: [
                    { icon: "fa-users", label: "Students", value: "145" },
                    { icon: "fa-bell", label: "Notices", value: "2" }
                ]
            }
        };

        // --- SECURITY GUARD & DYNAMIC NAMING ---
        async function initPortal() {
            const { data: { user } } = await _supabase.auth.getUser();

            // 1. Unauthorised Redirect
            if (!user) {
                window.location.href = 'signin.html'; 
                return;
            }

            const metadata = user.user_metadata;
            const role = metadata.role ? metadata.role.toLowerCase() : 'student';

            // 2. Display Name and Initials
            const fullName = metadata.full_name || "User Name";
            document.getElementById('userName').innerText = fullName;
            
            const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('userInitials').innerText = initials;

            // 3. Load UI based on Role
            loadDashboard(role);
        }

        function loadDashboard(type) {
            const data = config[type] || config.student;
            document.getElementById('portalName').innerText = data.name;
            document.getElementById('welcomeMsg').innerText = data.welcome;
            
            document.getElementById('sideNav').innerHTML = data.nav.map(item => `
                <li class="nav-item"><i class="fas ${item.icon}"></i><span>${item.text}</span></li>
            `).join('');

            document.getElementById('statsGrid').innerHTML = data.stats.map(stat => `
                <div class="stat-card">
                    <i class="fas ${stat.icon}"></i>
                    <h3>${stat.label}</h3>
                    <div class="value">${stat.value}</div>
                </div>
            `).join('');
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'signin.html';
        }

        initPortal();
    </script>
</body>
</html>
